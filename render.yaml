services:
  # FastAPI backend
  - type: web
    name: nse-backend
    runtime: python
    rootDir: apps/backend
    buildCommand: |
      pip install -e ../../packages/nse_engine
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nse-redis
          type: redis
          property: connectionString
      - key: UPLOAD_DIR
        value: /tmp/nse_uploads
      - key: OUTPUT_DIR
        value: /tmp/nse_outputs
      - key: PYTHONPATH
        value: /opt/render/project/src/packages/nse_engine

  # Background worker
  - type: worker
    name: nse-worker
    runtime: python
    rootDir: apps/backend
    buildCommand: |
      pip install -e ../../packages/nse_engine
      pip install -r requirements.txt
    startCommand: rq worker --url $REDIS_URL nse
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nse-redis
          type: redis
          property: connectionString
      - key: UPLOAD_DIR
        value: /tmp/nse_uploads
      - key: OUTPUT_DIR
        value: /tmp/nse_outputs
      - key: PYTHONPATH
        value: /opt/render/project/src/packages/nse_engine

  # Redis (must be in services, not databases)
  - type: redis
    name: nse-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []   # internal only — backend and worker access via private network

  # Frontend static site
  # VITE_API_BASE bakes the backend URL into the JS bundle at build time.
  # Render static sites cannot rewrite to external domains, so we skip the
  # /api/* rewrite and let the browser call the backend directly (CORS is open).
  - type: web
    name: nse-frontend
    runtime: static
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://nse-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: nse-db
    databaseName: nse
    user: nse
    plan: free
