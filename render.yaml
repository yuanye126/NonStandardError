services:
  # FastAPI backend — free web service, SQLite, no Redis/worker needed
  # (jobs run in background threads via the built-in threading fallback)
  - type: web
    name: nse-backend
    runtime: python
    plan: free
    rootDir: apps/backend
    buildCommand: |
      pip install -e ../../packages/nse_engine
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////tmp/nse.db
      - key: UPLOAD_DIR
        value: /tmp/nse_uploads
      - key: OUTPUT_DIR
        value: /tmp/nse_outputs
      - key: PYTHONPATH
        value: /opt/render/project/src/packages/nse_engine
